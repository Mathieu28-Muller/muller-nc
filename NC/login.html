<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="/NC/favicon.svg">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connexion — Console Non-Conformités</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo-wrap{margin-bottom:32px;text-align:center}
.logo-wrap img{height:52px;object-fit:contain;filter:brightness(1.1)}
.logo-wrap h2{color:#e07070;font-size:0.72rem;font-weight:600;letter-spacing:4px;text-transform:uppercase;margin-top:10px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:32px 28px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.card h1{color:#fff;font-size:1.1rem;font-weight:700;margin-bottom:6px}
.card p{color:#666;font-size:0.8rem;margin-bottom:24px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#777}
.field input{padding:11px 14px;background:#111;border:1.5px solid #333;border-radius:7px;color:#fff;font-size:0.9rem;font-family:inherit;transition:border-color .2s}
.field input:focus{outline:none;border-color:#c0392b}
.field input::placeholder{color:#444}
.btn{width:100%;background:#c0392b;color:#fff;border:none;padding:13px;border-radius:7px;font-size:0.95rem;font-weight:700;cursor:pointer;margin-top:8px;transition:background .2s}
.btn:hover{background:#a93226}
.btn:disabled{background:#444;cursor:default}
.msg{margin-top:14px;padding:10px 14px;border-radius:6px;font-size:0.82rem;display:none}
.msg.error{background:#3a1a1a;border:1px solid #6a2020;color:#e07070}
.msg.ok{background:#1a3a1a;border:1px solid #206a20;color:#70e070}
footer{margin-top:32px;font-size:0.7rem;color:#333;text-align:center;letter-spacing:2px;text-transform:uppercase}
</style>
</head>
<body>

<div class="logo-wrap">
  <img src="../Base de cas/logo/Logo.png" alt="Muller Automotive" onerror="this.style.display='none'">
  <h2>Console Non-Conformités</h2>
</div>

<div class="card">
  <h1>Connexion</h1>
  <p>Accès réservé aux responsables NC</p>

  <form id="form-login" onsubmit="doLogin(event)">
    <div class="field">
      <label>Identifiant</label>
      <input type="text" id="nc-user" placeholder="identifiant" required autocomplete="username">
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="password" id="nc-pass" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="btn-login">Connexion</button>
  </form>

  <div class="msg" id="msg"></div>
</div>

<footer>© Muller Automotive — formation-sav.fr &nbsp;·&nbsp; <span style="color:#e67e22;font-weight:700">v1 — 01/05/2026</span></footer>

<script>
// Si ?logout dans l'URL, effacer le token et rester sur la page de login
(function(){
  if (window.location.search.includes('logout')) {
    localStorage.removeItem('nc_jwt');
    history.replaceState(null,'',window.location.pathname);
    return;
  }
  // Si déjà connecté avec un token valide, rediriger directement
  const token = localStorage.getItem('nc_jwt');
  if (!token) return;
  try {
    const p = JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    if (p.scope === 'nc' && p.exp > Date.now()/1000) window.location.href = 'console.html';
  } catch {}
})();

async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  const msg = document.getElementById('msg');
  btn.disabled = true; btn.textContent = 'Connexion…'; msg.style.display='none';

  const user = document.getElementById('nc-user').value.trim();
  const pass = document.getElementById('nc-pass').value;

  try {
    const res = await fetch('/api/nc-auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, pass })
    });
    const data = await res.json();
    if (data.result === 'ok') {
      localStorage.setItem('nc_jwt', data.token);
      window.location.href = 'console.html';
    } else {
      msg.textContent = 'Identifiant ou mot de passe incorrect.';
      msg.className = 'msg error'; msg.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Connexion';
    }
  } catch {
    msg.textContent = 'Serveur inaccessible.';
    msg.className = 'msg error'; msg.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Connexion';
  }
}
</script>
</body>
</html>
